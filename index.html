<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Spinning Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" role="status" aria-label="Loading">
        <div class="loader"><span class="core"></span><span class="dot"></span></div>
        <div class="reflection" aria-hidden="true">
            <div class="loader"><span class="core"></span><span class="dot"></span></div>
        </div>
    </div>
</body>
</html>
